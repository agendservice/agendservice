# version: '1'

name: agent-service
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentservice-app
    volumes:
      - ..:/var/www/agentservice
    working_dir: /var/www/agentservice
    networks:
      - agentservice
    depends_on:
      - db

  redis:
        image: 'redis:alpine'
        container_name: agentservice_redis
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'redis-data:/data'
        networks:
            - agentservice 
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s
  # Servidor Nginx
  nginx:
    image: nginx:alpine
    container_name: agentservice-nginx
    volumes:
      - ..:/var/www/agentservice
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    networks:
      - agentservice

  # MySQL
  db:
    image: mysql:8.0
    container_name: agentservice-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agentservice
      MYSQL_USER: admin
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - agentservice
    ports:
      - "3306:3306"

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: agentservice-phpmyadmin
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80"
    networks:
      - agentservice

networks:
  agentservice:
    driver: bridge

volumes:
  redis-data:
  db_data: