name: Tests & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpunit:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: agentservice
          MYSQL_USER: admin
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: agentservice
      DB_USERNAME: admin
      DB_PASSWORD: secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project directory
        id: workdir
        shell: bash
        run: |
          if [ -f "composer.json" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -f "source/composer.json" ]; then
            echo "dir=source" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "composer.json not found in repo root or ./source" >&2
          exit 1

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: pcov
          extensions: mbstring, dom, fileinfo, pdo_mysql

      - name: Get Composer cache directory
        id: composer-cache
        working-directory: ${{ steps.workdir.outputs.dir }}
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles(format('{0}/composer.lock', steps.workdir.outputs.dir)) }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: ${{ steps.workdir.outputs.dir }}
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare app
        working-directory: ${{ steps.workdir.outputs.dir }}
        shell: bash
        run: |
          cp .env.example .env
          php artisan key:generate
          chmod -R 777 storage bootstrap/cache

      - name: Run tests with coverage
        working-directory: ${{ steps.workdir.outputs.dir }}
        run: ./vendor/bin/phpunit --configuration phpunit.xml --coverage-clover coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ steps.workdir.outputs.dir }}/coverage.xml
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
